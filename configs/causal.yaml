# Causal Information Bottleneck Training Configuration
# -----------------------------------------------------
# Splits molecular graphs into Causal (pharmacophore) and Environmental
# (scaffold) subgraphs to isolate mechanisms of action and prevent
# spurious correlations.
#
# Usage:
#   uv run python scripts/train_causal.py --config configs/causal.yaml
#   uv run python scripts/train_causal.py --config configs/causal.yaml --model pna

# GNN backbone architecture (gcn, gin, pna, rgcn)
model: gcn
hidden_dim: 256
num_layers: 5

# Training hyperparameters
epochs: 100
batch_size: 128
lr: 0.001
dropout: 0.3
bottleneck_dim: 256

# Causal loss weights
sparsity_beta: 1.0   # Information bottleneck — forces minimal causal subgraph
env_beta: 0.5        # Environment penalty — penalizes spurious scaffold correlations

# Data
datasets:
  - bbbp
  - esol
  - freesolv
  - lipophilicity
  - bace
  - hiv
  - tox21
split_type: stratified_butina
similarity_cutoff: 0.4

# Infrastructure
accelerator: auto
num_workers: 8
