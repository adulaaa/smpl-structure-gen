# MolPropGNN Default Configuration
# -----------------------------------

# ── Data ──────────────────────────────────────────────────────────────
data:
  # MoleculeNet dataset
  dataset_name: "bbbp"
  task_type: "classification"
  num_tasks: 1

  # Data directories
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  num_workers: 0

  # Splitting strategy: "scaffold" or "random"
  split_type: "scaffold"
  frac_train: 0.8
  frac_val: 0.1
  frac_test: 0.1

# ── Model ─────────────────────────────────────────────────────────────
model:
  name: "gcn"

  gcn:
    hidden_dim: 64
    num_gnn_layers: 3
    decoder_hidden_dim: 64
    dropout: 0.2

  gat:
    hidden_dim: 32
    num_gnn_layers: 2
    heads: 4
    decoder_hidden_dim: 64
    dropout: 0.2

  egnn:
    hidden_dim: 64
    num_gnn_layers: 3
    decoder_hidden_dim: 64
    dropout: 0.2

  gine:
    hidden_dim: 64
    num_gnn_layers: 3
    decoder_hidden_dim: 64
    dropout: 0.2

  rgcn:
    hidden_dim: 64
    num_gnn_layers: 3
    num_relations: 4
    decoder_hidden_dim: 64
    dropout: 0.2

  mlp:
    hidden_dims: [64, 32]
    dropout: 0.2

  sage:
    hidden_dim: 128
    num_layers: 3
    decoder_hidden_dim: 64
    dropout: 0.2

  transformer:
    hidden_dim: 128
    num_gnn_layers: 3
    num_attention_heads: 8
    decoder_hidden_dim: 64
    dropout: 0.2

# ── Training ──────────────────────────────────────────────────────────
training:
  seed: 42
  max_epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler:
    name: "reduce_on_plateau"
    patience: 10
    factor: 0.5
  early_stopping:
    monitor: "val_loss"
    patience: 20
    mode: "min"

# ── Logging ───────────────────────────────────────────────────────────
logging:
  project_name: "mol-prop-gnn"
  save_dir: "lightning_logs"
  log_every_n_steps: 1
